services:
  urban-notes:
    image: urban-notes:latest
    build:
      context: .
      args:
        VERSION: v1.2.0
    container_name: urban-notes
    ports:
      - "8080:8080"
    environment:
      - AUTH_USER=admin          # optional, defaults to "admin"
      - AUTH_PASS=changeme        # required — change this before deploying
      - GOMEMLIMIT=128MiB        # prompt Go runtime to return freed memory to OS
    volumes:
      # Adjust the host path to wherever you want notes stored on the NAS.
      # The directory will be created automatically if it does not exist.
      - /volume1/docker/urban-notes/notes:/app/notes
    restart: unless-stopped
